<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Результаты опроса</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'polls/style.css' %}" />
  </head>
  <body>
    <div class="container">
      <h1>Результаты: {{ question.question_text }}</h1>
      <ul class="results-list">
        {% for choice in question.choice_set.all %}
        <li>
          {{ choice.choice_text }}
          <span class="vote-count"
            >{{ choice.votes }} голос{{ choice.votes|pluralize:",а,ов" }}</span
          >
        </li>
        {% endfor %}
      </ul>
      <a href="{% url 'polls:detail' question.id %}" class="link-back"
        >← Голосовать снова</a
      >
    </div>
  </body>
</html>
