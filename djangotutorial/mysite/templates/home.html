<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главная — Опросы</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f0f2f5 0%, #e0e7ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .card {
        max-width: 500px;
        width: 100%;
        background: white;
        border-radius: 32px;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        padding: 2rem 2rem 2.5rem;
        text-align: center;
        transition: transform 0.2s;
      }

      h1 {
        font-size: 2rem;
        font-weight: 600;
        color: #0a3b5c;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: #4a627a;
        margin-bottom: 2rem;
        border-bottom: 2px solid #eef2ff;
        display: inline-block;
        padding-bottom: 0.25rem;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .btn {
        display: block;
        padding: 1rem;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 600;
        border-radius: 60px;
        transition: all 0.2s;
        text-align: center;
      }

      .btn-primary {
        background: #1e6f9f;
        color: white;
        box-shadow: 0 4px 8px rgba(30, 111, 159, 0.2);
      }

      .btn-primary:hover {
        background: #0f5b85;
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(30, 111, 159, 0.3);
      }

      .btn-secondary {
        background: #f1f5f9;
        color: #1e293b;
        border: 1px solid #cbd5e1;
      }

      .btn-secondary:hover {
        background: #e6edf5;
        transform: translateY(-2px);
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #7c8b9c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Система опросов</h1>
      <div class="subtitle">Django Polls</div>
      <p>Выберите, куда хотите перейти:</p>
      <div class="button-group">
        <a href="{% url 'polls:index' %}" class="btn btn-primary"
          >Список опросов</a
        >
        <a href="{% url 'admin:index' %}" class="btn btn-secondary"
          >Админ-панель</a
        >
      </div>
      <div class="footer">
        {% if user.is_authenticated %} Вы вошли как
        <strong>{{ user.username }}</strong>
        {% else %} Вы не авторизованы {% endif %}
      </div>
    </div>
  </body>
</html>
